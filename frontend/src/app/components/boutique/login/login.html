<!-- src/app/components/boutique/login/login.html -->
<div class="login-page">
  <div class="login-card">

    <div class="brand">
      <span class="brand-icon">🛍️</span>
      <h1 class="brand-name">Ma Boutique</h1>
    </div>

    <div class="tabs">
      <button class="tab" [class.active]="mode === 'login'" (click)="mode = 'login'; erreur = ''">Connexion</button>
      <button class="tab" [class.active]="mode === 'register'" (click)="mode = 'register'; erreur = ''">Inscription</button>
    </div>

    <div class="erreur-msg" *ngIf="erreur">⚠️ {{ erreur }}</div>

    <!-- LOGIN -->
    <form *ngIf="mode === 'login'" (ngSubmit)="onLogin()">
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="loginData.email" name="email" required placeholder="votre@email.com">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="loginData.password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? '⏳ Connexion...' : '🔐 Se connecter' }}
      </button>
    </form>

    <!-- REGISTER -->
    <form *ngIf="mode === 'register'" (ngSubmit)="onRegister()">
      <div class="field">
        <label>Nom de la boutique</label>
        <input type="text" [(ngModel)]="registerData.nom" name="nom" required placeholder="Ex: Boutique Lova">
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" [(ngModel)]="registerData.email" name="email" required placeholder="votre@email.com">
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="registerData.password" name="password" required placeholder="Minimum 6 caractères" minlength="6">
      </div>
      <button type="submit" class="btn-submit" [disabled]="loading">
        {{ loading ? '⏳ Création...' : '✅ Créer mon compte' }}
      </button>
    </form>

  </div>
</div>
