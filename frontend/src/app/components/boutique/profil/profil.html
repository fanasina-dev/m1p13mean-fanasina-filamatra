<!-- src/app/components/boutique/profil/profil.html -->
<div class="layout">
  <app-sidebar></app-sidebar>

  <main class="main">

    <header class="topbar">
      <div>
        <p class="page-subtitle">Paramètres</p>
        <h1 class="page-title">Mon Profil</h1>
      </div>
    </header>

    <div *ngIf="isLoading" class="loading-state">⏳ Chargement...</div>

    <div *ngIf="!isLoading" class="profil-grid">

      <!-- CARTE PHOTO -->
      <div class="card photo-card">
        <div class="avatar-wrapper">
          <img
            *ngIf="photoPreview"
            [src]="photoPreview"
            class="avatar-img"
            alt="Photo boutique"
          >
          <div *ngIf="!photoPreview" class="avatar-placeholder">
            {{ boutique?.nom?.charAt(0) }}
          </div>
        </div>

        <h2 class="boutique-nom">{{ boutique?.nom }}</h2>
        <p class="boutique-email">{{ boutique?.email }}</p>

        <label class="btn-upload">
          📷 Changer la photo
          <input type="file" accept="image/*" (change)="onPhotoChange($event)" hidden>
        </label>
      </div>

      <!-- FORMULAIRE -->
      <div class="card form-card">
        <h3 class="form-title">✏️ Modifier mes informations</h3>

        <div *ngIf="successMsg" class="alert alert-success">✅ {{ successMsg }}</div>
        <div *ngIf="errorMsg"   class="alert alert-error">❌ {{ errorMsg }}</div>

        <form (ngSubmit)="onSubmit()">

          <div class="field">
            <label>Nom de la boutique</label>
            <input
              type="text"
              [(ngModel)]="form.nom"
              name="nom"
              placeholder="Nom de votre boutique"
            >
          </div>

          <div class="field">
            <label>Nouveau mot de passe</label>
            <input
              type="password"
              [(ngModel)]="form.password"
              name="password"
              placeholder="Laisser vide pour ne pas changer"
            >
          </div>

          <div class="field">
            <label>Confirmer le mot de passe</label>
            <input
              type="password"
              [(ngModel)]="form.confirmPassword"
              name="confirmPassword"
              placeholder="Répétez le nouveau mot de passe"
            >
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-submit" [disabled]="isSaving">
              {{ isSaving ? '⏳ Enregistrement...' : '💾 Enregistrer' }}
            </button>
            <button type="button" class="btn-logout" (click)="logout()">
              🚪 Déconnexion
            </button>
          </div>

        </form>
      </div>

    </div>

  </main>
</div>
